<head>

    <style>
        body {
            background-color: #000;
            color: #d00000;
            font-family: 'Creepster', system-ui;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        h1, h2, p, span {
            text-shadow: 0 0 10px #ff0000, 0 0 20px #5e0000;
            animation: flicker 4s infinite;
            margin: 10px 0;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; text-shadow: none; }
        }

        .sd { font-size: 0.8em; opacity: 0.5; }
    </style>
</head>

    </div>

</html>
